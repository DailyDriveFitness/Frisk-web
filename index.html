<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frisk Health – Health &amp; Wellness</title>
  <link rel="icon" href="icon.png" type="image/png">
  <meta http-equiv="refresh" content="0; url=en/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
  <link rel="stylesheet" href="lang-modal.css">
</head>

<body>
  <div class="redirect-page">
    <div class="redirect-card">
      <p>Redirecting to Frisk Health…</p>
      <p><a href="en/">Click here if not redirected</a></p>
      <div class="footer-lang-modal redirect-lang-modal">
        <button type="button" class="lang-modal-trigger lang-modal-trigger--footer lang-modal-open" aria-haspopup="dialog" aria-expanded="false" aria-controls="lang-modal">
          <span class="lang-modal-trigger-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
          <span class="lang-modal-trigger-kicker">Language</span>
          <span class="lang-modal-trigger-main">
            <span class="lang-modal-trigger-value">English</span>
            <span class="lang-modal-trigger-code">EN</span>
          </span>
          <svg class="lang-modal-trigger-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="lang-modal" class="lang-modal" role="dialog" aria-modal="true" aria-labelledby="lang-modal-title" hidden>
    <div class="lang-modal-backdrop" data-lang-close tabindex="-1"></div>
    <div class="lang-modal-panel">
      <span class="lang-modal-handle" aria-hidden="true"></span>
      <div class="lang-modal-header">
        <h2 id="lang-modal-title" class="lang-modal-title">Language</h2>
        <button type="button" class="lang-modal-close" data-lang-close aria-label="Close">×</button>
      </div>
      <ul class="lang-modal-list" role="listbox" aria-label="Language">
        <li role="none"><a href="en/" class="lang-modal-option" role="option" lang="en"><span class="lang-modal-native">English</span><span class="lang-modal-code">EN</span></a></li>
        <li role="none"><a href="es/" class="lang-modal-option" role="option" lang="es"><span class="lang-modal-native">Español</span><span class="lang-modal-code">ES</span></a></li>
        <li role="none"><a href="sv/" class="lang-modal-option" role="option" lang="sv"><span class="lang-modal-native">Svenska</span><span class="lang-modal-code">SV</span></a></li>
        <li role="none"><a href="no/" class="lang-modal-option" role="option" lang="no"><span class="lang-modal-native">Norsk</span><span class="lang-modal-code">NO</span></a></li>
        <li role="none"><a href="da/" class="lang-modal-option" role="option" lang="da"><span class="lang-modal-native">Dansk</span><span class="lang-modal-code">DA</span></a></li>
        <li role="none"><a href="fi/" class="lang-modal-option" role="option" lang="fi"><span class="lang-modal-native">Suomi</span><span class="lang-modal-code">FI</span></a></li>
      </ul>
    </div>
  </div>
  <script src="lang-modal.js"></script>
</body>
</html>
